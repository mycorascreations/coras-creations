# ============================================
# Cora's Creations — Netlify Configuration
# ============================================

[build]
  publish   = "."          # serve files from root
  functions = "netlify/functions"

[build.environment]
  # Firebase API keys are intentionally public — security is enforced by Firestore rules.
  # Disable secret scanning to prevent false-positive on the AIza*** Firebase key pattern.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Redirect all routes to index.html (SPA support)
# Note: /.netlify/functions/* is handled by Netlify infrastructure before this rule
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
